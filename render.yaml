services:
  # Backend API
  - type: web
    name: warpfix-api
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: warpfix-redis
          property: connectionString
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: LLM_PROVIDER
        value: groq,github
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: GITHUB_MODELS_MODEL
        value: openai/gpt-4o-mini
      - key: DODO_API_KEY
        sync: false
      - key: DODO_WEBHOOK_SECRET
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
    healthCheckPath: /health

  # Frontend
  - type: web
    name: warpfix-frontend
    runtime: node
    plan: starter
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # Worker
  - type: worker
    name: warpfix-worker
    runtime: node
    plan: starter
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/queue/worker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: warpfix-redis
          property: connectionString
      - key: LLM_PROVIDER
        value: groq,github
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_API_URL
        value: https://api.groq.com/openai/v1
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GITHUB_MODELS_TOKEN
        sync: false
      - key: GITHUB_MODELS_MODEL
        value: openai/gpt-4o-mini
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false

  # Redis Key-Value Store
  - type: keyvalue
    name: warpfix-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

  # Cron - Monthly usage reset
  - type: cron
    name: warpfix-cron-usage
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/cron/index.js usage-reset
    schedule: "0 0 1 * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString

  # Cron - Daily telemetry aggregation
  - type: cron
    name: warpfix-cron-telemetry
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/cron/index.js telemetry
    schedule: "0 2 * * *"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString

  # Cron - Weekly dependency radar
  - type: cron
    name: warpfix-cron-deps
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node src/cron/index.js dependency-radar
    schedule: "0 6 * * 0"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: warpfix-db
          property: connectionString

databases:
  - name: warpfix-db
    plan: basic-256mb
    databaseName: warpfix
    user: warpfix

